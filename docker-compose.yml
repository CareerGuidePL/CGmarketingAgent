# n8n self-hosted: lokalny dev lub ten sam plik na VPS (np. /opt/CGmarketingAgent). See `.env.example`.
# Start: `docker compose up -d`  →  http://127.0.0.1:5679
# Data persists in Docker volume `n8n_data` (SQLite under /home/node/.n8n).
#
# Public URL (Discord webhooks / Send and Wait): optional ngrok sidecar — same Docker network as n8n.
#   1. Set NGROK_AUTHTOKEN in `.env` (https://dashboard.ngrok.com/get-started/your-authtoken)
#   2. Sprawdź `docker ps`: stary kontener **ngrok** (np. z innego projektu) często mapuje :4040 i `--domain=*.ngrok-free.dev`.
#      Koliduje z tym stackiem → brak startu na :4040, ERR_NGROK_334 albo błąd w przeglądarce; zatrzymaj/usuń go (`docker stop ngrok`).
#   3. docker compose --profile tunnel up -d
#   4. Wspólny URL zespołu: w `.env` ustaw NGROK_PUBLIC_URL=https://twoja.ngrok-free.dev oraz TEN SAM
#      NGROK_AUTHTOKEN z konta, które ma tę domenę (1Password — nie git). Potem N8N_HOST + WEBHOOK_URL (https)
#      i restart n8n. Bez NGROK_PUBLIC_URL tunel ma losowy host — stary link → ERR_NGROK_8012 / 502.
#      Panel: http://127.0.0.1:4041 (4041 unika konfliktu z lokalnym ngrok.exe na :4040)

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5679:5678"
    environment:
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: "5678"
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5679/}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Warsaw}
      TZ: ${GENERIC_TIMEZONE:-Europe/Warsaw}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:?Set N8N_ENCRYPTION_KEY in .env (see .env.example)}
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
    volumes:
      - n8n_data:/home/node/.n8n

  # Tunel do n8n po nazwie serwisu (wewnętrzny port 5678 — NIE 5679; 5679 jest tylko na hoście).
  ngrok:
    profiles: ["tunnel"]
    image: ngrok/ngrok:latest
    restart: unless-stopped
    depends_on:
      - n8n
    entrypoint: ["/bin/sh", "/ngrok-entrypoint.sh"]
    volumes:
      - ./docker/ngrok-entrypoint.sh:/ngrok-entrypoint.sh:ro
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN:-}
      NGROK_PUBLIC_URL: ${NGROK_PUBLIC_URL:-}
    ports:
      # W kontenerze nadal 4040 (interfejs agenta). Na hoście 4041 — lokalny ngrok często trzyma już :4040.
      - "127.0.0.1:4041:4040"

  # Self-hosted HTML/CSS to Image renderer (replaces hcti.io).
  # Internal only — not exposed to the internet. n8n calls http://hcti-render:3000/render
  hcti-render:
    build: ./services/hcti-render
    restart: unless-stopped
    environment:
      PORT: "3000"
    # No ports exposed to host — accessible only within Docker network

volumes:
  n8n_data:
